<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scenario Challenge - Let's Go 4</title>
    <style>
        :root { --red: #d32f2f; --white: #ffffff; --gray: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: var(--white); color: #333; margin: 0; padding-bottom: 50px; }
        header { background-color: var(--red); color: var(--white); padding: 20px; margin-bottom: 30px; }
        .scenario-card { max-width: 600px; margin: 20px auto; padding: 30px; border: 3px solid var(--red); border-radius: 20px; background: white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: none; }
        .active { display: block; animation: fadeIn 0.5s; }
        .btn-option { display: block; width: 100%; background: var(--white); border: 2px solid var(--red); color: var(--red); padding: 15px; margin: 10px 0; font-size: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-option:hover { background: var(--red); color: var(--white); }
        #feedback-box { font-size: 24px; font-weight: bold; margin-top: 20px; min-height: 40px; }
        .success { color: #2e7d32; }
        .error { color: var(--red); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>Scenario Challenge</h1>
    <p>Test Your Knowledge!</p>
</header>

    </div>
