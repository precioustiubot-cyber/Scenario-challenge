<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scenario Challenge - Let's Go 4</title>
    <style>
        :root { --red: #d32f2f; --white: #ffffff; }
        body { font-family: sans-serif; text-align: center; background: var(--white); color: #333; margin: 0; }
        header { background: var(--red); color: white; padding: 20px; border-bottom: 5px solid #b71c1c; }
        .card { max-width: 500px; margin: 40px auto; padding: 30px; border: 3px solid var(--red); border-radius: 20px; display: none; }
        .active { display: block; }
        .btn { display: block; width: 100%; background: white; border: 2px solid var(--red); color: var(--red); padding: 15px; margin: 10px 0; font-size: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: var(--red); color: white; }
        #feedback { font-size: 24px; font-weight: bold; margin-top: 20px; height: 30px; }
        .success { color: green; }
        .error { color: var(--red); }
    </style>
</head>
<body>

<header><h1>Vocabulary Challenge</h1></header>

<div id="q1" class="card active">
    <h2>Scenario 1</h2>
    <p>I am done grocery shopping. Where should I pay?</p>
    <button class="btn" onclick="check(false)">Produce</button>
    <button class="btn" onclick="check(false)">Bakery</button>
    <button class="btn" onclick="check(true, 'q2')">Checkout Counter</button>
</div>

<div id="q2" class="card">
    <h2>Scenario 2</h2>
    <p>Fire! Fire! I need something to put out the fire!</p>
    <button class="btn" onclick="check(true, 'finish')">Fire Extinguisher</button>
    <button class="btn" onclick="check(false)">Bucket of Ice</button>
    <button class="btn" onclick="check(false)">Fanta</button>
</div>

<div id="finish" class="card">
    <h2 class="success">Great Job!</h2>
    <p>You finished the challenge!</p>
    <button class="btn" onclick="location.reload()">Restart</button>
</div>

<div id="feedback"></div>

<script>
    function check(isCorrect, nextId) {
        const feedback = document.getElementById('feedback');
        if (isCorrect) {
            feedback.innerHTML = "<span class='success'>Great job!</span>";
            setTimeout(() => {
                document.querySelector('.active').classList.remove('active');
                document.getElementById(nextId).classList.add('active');
                feedback.innerHTML = "";
            }, 1000);
        } else {
            feedback.innerHTML = "<span class='error'>Try again.</span>";
        }
    }
</script>

</body>
</html>
